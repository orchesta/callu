<!-- On-Call Notification Email Content -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td style="font-size: 20px; font-weight: 600; color: #111111; padding-bottom: 16px;">
            Incident Alert
        </td>
    </tr>
    <tr>
        <td style="padding-bottom: 20px;">
            <!-- Alert Box -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                style="background-color: #fee2e2; border: 1px solid #ef4444; border-radius: 6px;">
                <tr>
                    <td style="padding: 12px; color: #991b1b; font-size: 14px; font-weight: 600;">
                        You are on-call and a new incident requires your attention.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td>
            <!-- Incident Details Table -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                style="background-color: #f9fafb; border-radius: 6px;">
                <tr>
                    <td style="padding: 16px;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td style="padding: 8px 0; color: #6b7280; font-size: 14px; width: 100px;">Incident:
                                </td>
                                <td style="padding: 8px 0; color: #111111; font-size: 14px; font-weight: 600;">
                                    {{IncidentTitle}}</td>
                            </tr>
                            <tr>
                                <td style="padding: 8px 0; color: #6b7280; font-size: 14px;">Severity:</td>
                                <td style="padding: 8px 0;">
                                    <span style="{{SeverityStyle}}">{{Severity}}</span>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td align="center" style="padding: 24px 0;">
            <!--[if mso]>
            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{IncidentUrl}}" style="height:44px;v-text-anchor:middle;width:160px;" arcsize="14%" strokecolor="#dc2626" fillcolor="#dc2626">
            <w:anchorlock/>
            <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">View Incident</center>
            </v:roundrect>
            <![endif]-->
            <!--[if !mso]><!-->
            <a href="{{IncidentUrl}}"
                style="display: inline-block; background-color: #dc2626; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-weight: 600; font-size: 16px;">View
                Incident</a>
            <!--<![endif]-->
        </td>
    </tr>
    <tr>
        <td align="center" style="color: #888888; font-size: 14px;">
            <p style="margin: 0;">Please acknowledge or resolve this incident as soon as possible.</p>
        </td>
    </tr>
</table>
