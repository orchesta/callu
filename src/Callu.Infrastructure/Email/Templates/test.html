<!-- Test Email Content -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td style="font-size: 20px; font-weight: 600; color: #111111; padding-bottom: 16px;">
            Test Email ✅
        </td>
    </tr>
    <tr>
        <td style="color: #555555; font-size: 16px; line-height: 1.6;">
            <p style="margin: 0 0 16px 0;">Congratulations! Your SMTP configuration is working correctly.</p>
            <p style="margin: 0 0 24px 0;">This is a test email sent from CalluApp to verify your email settings.</p>
        </td>
    </tr>
    <tr>
        <td>
            <!-- Success Box -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                style="background-color: #ecfdf5; border: 1px solid #10b981; border-radius: 6px;">
                <tr>
                    <td style="padding: 16px;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td style="color: #059669; font-size: 16px; font-weight: 600;">
                                    ✓ Connection successful
                                </td>
                            </tr>
                            <tr>
                                <td style="color: #047857; font-size: 14px; padding-top: 4px;">
                                    Your email configuration is ready to use.
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="color: #888888; font-size: 14px; padding-top: 24px;">
            <p style="margin: 0;">Sent at: {{Timestamp}}</p>
        </td>
    </tr>
</table>
