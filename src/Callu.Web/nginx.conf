# ─── HTTP → HTTPS redirect ───────────────────────────────────────
# Only active when TLS is enabled (cert + key volumes mounted).
# If no cert is present, this block is ignored and the server below
# handles all traffic on port 3000.
server {
    listen 3000;
    server_name _;

    # If TLS_ENABLED env is "true" (set via docker-compose), redirect to HTTPS.
    # Without certs this server block simply serves everything on HTTP.

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # ─── API Reverse Proxy ────────────────────────────────
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://callu-api:5095;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 10m;
    }

    # ─── SignalR WebSocket Proxy ──────────────────────────
    location /hubs/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://callu-api:5095;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ─── Health Check Proxy ───────────────────────────────
    location /health {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://callu-api:5095;
        proxy_pass $api_upstream;
    }

    # ─── SPA — React Router ──────────────────────────────
    # index.html must never be cached — it contains references to hashed chunks
    # that change on each deployment. Stale index.html = "error loading module".
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache Static Assets ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

